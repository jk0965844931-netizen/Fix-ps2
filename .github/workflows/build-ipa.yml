name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SCHEME: iPSX2
  BUILD_DIR: ${{ github.workspace }}/build
  ARCHIVE_PATH: ${{ github.workspace }}/build/iPSX2.xcarchive
  IPA_DIR: ${{ github.workspace }}/ipa-staging
  IPA_PATH: ${{ github.workspace }}/iPSX2-unsigned.ipa

jobs:
  build-ipa:
    name: Build Unsigned iPSX2.ipa
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          XCODE=$(ls /Applications | grep '^Xcode' | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Install build tools
        run: |
          set -euo pipefail
          brew update --quiet
          brew install cmake xcbeautify || true

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-
          max-size: 2G

      - name: CMake configure (Xcode generator, iphoneos SDK)
        working-directory: cpp
        run: |
          set -euo pipefail
          cmake -B ../build \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=18.0 \
            -DiPSX2_REAL_DEVICE=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            "-DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=" \
            --fresh 2>&1 | tee /tmp/cmake_configure.log
          if grep -q "^CMake Error" /tmp/cmake_configure.log; then
            echo "❌ CMake configure reported errors (see above)"
            exit 1
          fi
          echo "✅ CMake configure completed successfully"

      - name: Generate compile_commands.json (stub)
        run: |
          mkdir -p "$BUILD_DIR"
          echo "[]" > "$BUILD_DIR/compile_commands.json"
          echo "Note: Xcode generator does not emit compile_commands.json; stub written."

      - name: Upload compile_commands.json
        uses: actions/upload-artifact@v6
        with:
          name: compile-commands-${{ github.run_number }}
          path: ${{ env.BUILD_DIR }}/compile_commands.json
          retention-days: 30
          if-no-files-found: warn

      - name: Discover xcodeproj
        run: |
          set -euo pipefail
          echo "=== Contents of build/ ==="
          ls -la "$BUILD_DIR"
          XCODEPROJ=$(find "$BUILD_DIR" -maxdepth 1 -name "*.xcodeproj" | head -1)
          if [ -z "$XCODEPROJ" ]; then
            echo "❌ No .xcodeproj found in $BUILD_DIR — CMake configure must have failed."
            tail -50 /tmp/cmake_configure.log || true
            exit 1
          fi
          echo "✅ Found: $XCODEPROJ"
          echo "XCODEPROJ=$XCODEPROJ" >> "$GITHUB_ENV"
          xcodebuild -project "$XCODEPROJ" -list 2>&1 || true

      - name: Build & Archive (unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SKIP_INSTALL=NO \
            2>&1 | xcbeautify
          test -d "$ARCHIVE_PATH" || (echo "❌ Archive not found at $ARCHIVE_PATH" && exit 1)
          echo "✅ Archive created: $ARCHIVE_PATH"

      - name: Assemble unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find "$BUILD_DIR" ~/Library/Developer/Xcode/DerivedData -name "iPSX2*.app" -type d 2>/dev/null | head -1 || true)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ Could not find .app in $BUILD_DIR or DerivedData"
            find /Users/runner -name "iPSX2*.app" -type d 2>/dev/null || true
            exit 1
          fi
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload" "$IPA_DIR/SwiftSupport/iphoneos"
          cp -rP "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qyr "$IPA_PATH" Payload SwiftSupport
          echo "✅ IPA assembled: $(du -sh "$IPA_PATH" | cut -f1)"

      - name: Verify IPA structure
        run: |
          unzip -l "$IPA_PATH" | head -35
          unzip -l "$IPA_PATH" | grep -q "Payload/.*\.app/" \
            && echo "✅ App bundle found inside Payload" \
            || (echo "❌ IPA is malformed" && exit 1)

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v6
        with:
          name: iPSX2-unsigned-${{ github.run_number }}
          path: ${{ env.IPA_PATH }}
          retention-days: 30
          if-no-files-found: error

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            /tmp/cmake_configure.log
            ~/Library/Logs/DiagnosticReports/
          retention-days: 7
          if-no-files-found: ignore
